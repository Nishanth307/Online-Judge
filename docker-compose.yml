
services:
  # backend:
  #   ports:
  #     - "5000:5000"
  #   volumes:
  #     - ./backend:/app 
  #     - /app/node_modules
  #   command: npm run dev
  #   depends_on:
  #     - mongo 

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:16-alpine 
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=[PASSWORD]
      - POSTGRES_DB=oj_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  mongo-data:
  postgres-data:
    
